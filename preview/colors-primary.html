<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:var(--surface);margin:0;padding:20px;}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);}
  .sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;color:var(--grey-900);}
  .sw.dark{color:#fff;}
  .sw .n{font-size:10px;font-weight:600;}
  .sw .h{font-family:var(--font-mono);font-size:10px;opacity:0.7;margin-top:2px;}
  .lbl{font-size:11px;font-weight:600;color:var(--text-secondary);margin:14px 0 6px;letter-spacing:0.04em;text-transform:uppercase;}
</style></head>
<body>
  <div class="lbl">Primary — 908 Blue</div>
  <div class="row">
    <div class="sw" style="background:var(--primary-50)"><div class="n">50</div><div class="h">#E8F1FF</div></div>
    <div class="sw" style="background:var(--primary-100)"><div class="n">100</div><div class="h">#CCE0FF</div></div>
    <div class="sw" style="background:var(--primary-200)"><div class="n">200</div><div class="h">#99C1FF</div></div>
    <div class="sw" style="background:var(--primary-300)"><div class="n">300</div><div class="h">#66A1FF</div></div>
    <div class="sw dark" style="background:var(--primary-400)"><div class="n">400</div><div class="h">#3382FF</div></div>
    <div class="sw dark" style="background:var(--primary-500)"><div class="n">500</div><div class="h">#0064FF</div></div>
    <div class="sw dark" style="background:var(--primary-600)"><div class="n">600</div><div class="h">#0051CC</div></div>
    <div class="sw dark" style="background:var(--primary-700)"><div class="n">700</div><div class="h">#003D99</div></div>
    <div class="sw dark" style="background:var(--primary-800)"><div class="n">800</div><div class="h">#002966</div></div>
    <div class="sw dark" style="background:var(--primary-900)"><div class="n">900</div><div class="h">#001633</div></div>
  </div>
</body></html>
