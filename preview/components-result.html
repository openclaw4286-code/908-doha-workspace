<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:var(--surface);margin:0;padding:20px;color:var(--text-primary);font-family:var(--font-sans);text-align:center;}
  .result{max-width:320px;margin:0 auto;}
  .art{width:72px;height:72px;margin:0 auto 20px;border-radius:50%;background:var(--accent-brand-soft);display:flex;align-items:center;justify-content:center;font-size:34px;color:var(--accent-brand);}
  .title{font-family:var(--font-serif);font-size:24px;font-weight:500;letter-spacing:-0.01em;margin-bottom:8px;}
  .desc{font-size:14px;color:var(--text-secondary);line-height:22px;margin-bottom:20px;}
  .cta{background:var(--accent-brand);color:#fff;padding:12px 22px;border-radius:var(--radius-md);font-size:14px;font-weight:600;border:0;font-family:inherit;cursor:pointer;}
</style></head>
<body>
  <div class="result">
    <div class="art">✓</div>
    <div class="title">Sent.</div>
    <div class="desc">500 QAR is on its way to Laila. Arrives in under a minute.</div>
    <button class="cta">Done</button>
  </div>
</body></html>
