<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:var(--surface);margin:0;padding:20px;color:var(--text-primary);font-family:var(--font-sans);}
  .row{display:flex;align-items:baseline;gap:16px;padding:10px 0;border-bottom:1px solid var(--border-subtle);}
  .row:last-child{border:0;}
  .sample{flex:1;letter-spacing:-0.02em;}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);min-width:110px;text-align:right;}
  .tok{font-size:11px;font-weight:600;color:var(--text-secondary);min-width:72px;}
</style></head>
<body>
  <div class="row"><span class="tok">Display</span><span class="sample" style="font-size:40px;line-height:48px;font-weight:700">908 Doha, 조용한 금융.</span><span class="meta">40/48 · 700</span></div>
  <div class="row"><span class="tok">Title 1</span><span class="sample" style="font-size:32px;line-height:40px;font-weight:700">Good evening, Laila</span><span class="meta">32/40 · 700</span></div>
  <div class="row"><span class="tok">Title 2</span><span class="sample" style="font-size:26px;line-height:34px;font-weight:600">저축으로 옮기기</span><span class="meta">26/34 · 600</span></div>
  <div class="row"><span class="tok">Title 3</span><span class="sample" style="font-size:22px;line-height:30px;font-weight:600">Transfer confirm</span><span class="meta">22/30 · 600</span></div>
</body></html>
