<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:var(--surface);margin:0;padding:20px;color:var(--text-primary);font-family:var(--font-sans);}
  .row{display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid var(--border-subtle);}
  .row:last-child{border:0;}
  .sample{flex:1;letter-spacing:-0.01em;}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);min-width:110px;text-align:right;}
  .tok{font-size:11px;font-weight:600;color:var(--text-secondary);min-width:72px;}
</style></head>
<body>
  <div class="row"><span class="tok">Heading 1</span><span class="sample" style="font-size:18px;line-height:26px;font-weight:600">최근 내역 · Recent activity</span><span class="meta">18/26 · 600</span></div>
  <div class="row"><span class="tok">Heading 2</span><span class="sample" style="font-size:16px;line-height:24px;font-weight:600">Cards on this account</span><span class="meta">16/24 · 600</span></div>
  <div class="row"><span class="tok">Body 1</span><span class="sample" style="font-size:16px;line-height:26px;font-weight:400">이 계좌로의 송금은 보통 1분 안에 도착해요.</span><span class="meta">16/26 · 400</span></div>
  <div class="row"><span class="tok">Body 2</span><span class="sample" style="font-size:14px;line-height:22px;font-weight:400">Your salary arrived Tuesday. Most of it is already at work.</span><span class="meta">14/22 · 400</span></div>
  <div class="row"><span class="tok">Label</span><span class="sample" style="font-size:13px;line-height:18px;font-weight:500">Confirm transfer</span><span class="meta">13/18 · 500</span></div>
  <div class="row"><span class="tok">Caption</span><span class="sample" style="font-size:12px;line-height:16px;font-weight:400">QR valid for 60 seconds</span><span class="meta">12/16 · 400</span></div>
</body></html>
