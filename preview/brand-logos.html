<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:var(--surface);margin:0;padding:16px;}
  .g{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .logo{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);font-weight:700;font-size:28px;letter-spacing:-1px;}
  .l1{background:var(--accent-brand);color:#fff;}
  .l2{background:var(--grey-50);color:var(--accent-brand);border:1px solid var(--border-subtle);}
  .l3{background:var(--grey-900);color:#fff;}
  .wm{background:var(--surface);color:var(--grey-900);border:1px solid var(--border-subtle);font-size:18px;}
  .wm b{color:var(--accent-brand);}
  .cap{font-size:10px;color:var(--text-tertiary);text-align:center;margin-top:6px;}
</style></head>
<body>
  <div class="g">
    <div><div class="logo l1">908</div><div class="cap">Primary</div></div>
    <div><div class="logo l2">908</div><div class="cap">Soft</div></div>
    <div><div class="logo l3">908</div><div class="cap">Mono</div></div>
    <div><div class="logo wm"><span><b>908</b> Doha</span></div><div class="cap">Wordmark</div></div>
  </div>
</body></html>
