<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:var(--surface);margin:0;padding:20px;color:var(--text-primary);font-family:var(--font-sans);}
  .col{display:flex;flex-direction:column;gap:18px;max-width:460px;}
  .seg{display:flex;background:var(--grey-100);border-radius:var(--radius-md);padding:4px;gap:2px;}
  .seg button{flex:1;border:0;background:transparent;padding:8px 12px;font-size:13px;font-weight:500;color:var(--text-secondary);cursor:pointer;border-radius:calc(var(--radius-md) - 4px);font-family:inherit;transition:all .28s var(--ease-soft);}
  .seg button.on{background:var(--surface);color:var(--text-primary);box-shadow:var(--elev-1);font-weight:600;}
  .pb{height:8px;background:var(--grey-100);border-radius:999px;overflow:hidden;}
  .pb>div{height:100%;background:var(--accent-brand);border-radius:999px;width:68%;}
  .steps{display:flex;align-items:center;gap:8px;}
  .step{width:22px;height:22px;border-radius:50%;background:var(--grey-200);color:var(--text-tertiary);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}
  .step.done{background:var(--accent-brand);color:#fff;}
  .step.cur{background:var(--accent-brand-soft);color:var(--accent-brand);border:1.5px solid var(--accent-brand);}
  .line{flex:1;height:2px;background:var(--grey-200);}
  .line.done{background:var(--accent-brand);}
</style></head>
<body>
  <div class="col">
    <div class="seg"><button class="on">Activity</button><button>Cards</button><button>Insights</button></div>
    <div class="pb"><div></div></div>
    <div class="steps"><div class="step done">✓</div><div class="line done"></div><div class="step done">✓</div><div class="line done"></div><div class="step cur">3</div><div class="line"></div><div class="step">4</div></div>
  </div>
</body></html>
