<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:var(--surface);margin:0;padding:20px;color:var(--text-primary);}
  .row{display:flex;align-items:center;gap:16px;padding:6px 0;}
  .bar{background:var(--primary-200);height:14px;border-radius:3px;}
  .tok{min-width:72px;font-size:11px;font-weight:600;color:var(--text-secondary);}
  .val{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);min-width:40px;}
</style></head>
<body>
  <div class="row"><span class="tok">space-2</span><div class="bar" style="width:4px"></div><span class="val">4</span></div>
  <div class="row"><span class="tok">space-3</span><div class="bar" style="width:8px"></div><span class="val">8</span></div>
  <div class="row"><span class="tok">space-4</span><div class="bar" style="width:12px"></div><span class="val">12</span></div>
  <div class="row"><span class="tok">space-5</span><div class="bar" style="width:16px"></div><span class="val">16</span></div>
  <div class="row"><span class="tok">space-6</span><div class="bar" style="width:20px"></div><span class="val">20</span></div>
  <div class="row"><span class="tok">space-7</span><div class="bar" style="width:24px"></div><span class="val">24</span></div>
  <div class="row"><span class="tok">space-8</span><div class="bar" style="width:32px"></div><span class="val">32</span></div>
  <div class="row"><span class="tok">space-9</span><div class="bar" style="width:40px"></div><span class="val">40</span></div>
  <div class="row"><span class="tok">space-10</span><div class="bar" style="width:48px"></div><span class="val">48</span></div>
  <div class="row"><span class="tok">space-11</span><div class="bar" style="width:64px"></div><span class="val">64</span></div>
</body></html>
