<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:var(--surface);margin:0;padding:20px;color:var(--text-primary);font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;}
  .cell{border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:18px;}
  .tag{font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
  .sample{font-size:28px;line-height:1.2;letter-spacing:-0.015em;color:var(--text-primary);}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);margin-top:10px;}
</style></head>
<body>
  <div class="grid">
    <div class="cell">
      <div class="tag">Sans · Pretendard (local)</div>
      <div class="sample" style="font-family:var(--font-sans);font-weight:600">908로 옮기기</div>
      <div class="meta">font-sans · 100–900 · UI chrome</div>
    </div>
    <div class="cell">
      <div class="tag">Serif · Fraunces</div>
      <div class="sample" style="font-family:var(--font-serif);font-weight:500">Quiet, by design.</div>
      <div class="meta">font-serif · editorial moments</div>
    </div>
    <div class="cell">
      <div class="tag">Mono · JetBrains</div>
      <div class="sample" style="font-family:var(--font-mono);font-weight:500">QA91 DOHB 0908</div>
      <div class="meta">font-mono · IBANs, codes</div>
    </div>
  </div>
</body></html>
