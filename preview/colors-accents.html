<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:var(--surface);margin:0;padding:20px;}
  .scale{display:flex;gap:0;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-subtle);}
  .sw{flex:1;height:40px;display:flex;align-items:center;justify-content:center;color:var(--grey-900);font-size:9px;font-weight:600;}
  .sw.dark{color:#fff;}
  .lbl{font-size:11px;font-weight:600;color:var(--text-secondary);margin:10px 0 4px;letter-spacing:0.04em;text-transform:uppercase;}
</style></head>
<body>
  <div class="lbl">Yellow · Highlight</div>
  <div class="scale">
    <div class="sw" style="background:var(--yellow-50)">50</div><div class="sw" style="background:var(--yellow-100)">100</div>
    <div class="sw" style="background:var(--yellow-200)">200</div><div class="sw" style="background:var(--yellow-300)">300</div>
    <div class="sw" style="background:var(--yellow-400)">400</div><div class="sw dark" style="background:var(--yellow-500)">500</div>
    <div class="sw dark" style="background:var(--yellow-600)">600</div><div class="sw dark" style="background:var(--yellow-700)">700</div>
    <div class="sw dark" style="background:var(--yellow-800)">800</div><div class="sw dark" style="background:var(--yellow-900)">900</div>
  </div>
  <div class="lbl">Teal · Information</div>
  <div class="scale">
    <div class="sw" style="background:var(--teal-50)">50</div><div class="sw" style="background:var(--teal-100)">100</div>
    <div class="sw" style="background:var(--teal-200)">200</div><div class="sw" style="background:var(--teal-300)">300</div>
    <div class="sw dark" style="background:var(--teal-400)">400</div><div class="sw dark" style="background:var(--teal-500)">500</div>
    <div class="sw dark" style="background:var(--teal-600)">600</div><div class="sw dark" style="background:var(--teal-700)">700</div>
    <div class="sw dark" style="background:var(--teal-800)">800</div><div class="sw dark" style="background:var(--teal-900)">900</div>
  </div>
  <div class="lbl">Purple · Premium accent</div>
  <div class="scale">
    <div class="sw" style="background:var(--purple-50)">50</div><div class="sw" style="background:var(--purple-100)">100</div>
    <div class="sw" style="background:var(--purple-200)">200</div><div class="sw" style="background:var(--purple-300)">300</div>
    <div class="sw dark" style="background:var(--purple-400)">400</div><div class="sw dark" style="background:var(--purple-500)">500</div>
    <div class="sw dark" style="background:var(--purple-600)">600</div><div class="sw dark" style="background:var(--purple-700)">700</div>
    <div class="sw dark" style="background:var(--purple-800)">800</div><div class="sw dark" style="background:var(--purple-900)">900</div>
  </div>
</body></html>
