<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:var(--surface);margin:0;padding:20px;color:var(--text-primary);font-family:var(--font-sans);}
  .col{display:flex;flex-direction:column;gap:16px;max-width:460px;}
  /* Slider */
  .slider{height:28px;display:flex;align-items:center;position:relative;}
  .track{flex:1;height:4px;background:var(--grey-200);border-radius:999px;position:relative;}
  .fill{position:absolute;left:0;top:0;height:100%;background:var(--accent-brand);border-radius:999px;width:60%;}
  .thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:2px solid var(--accent-brand);position:absolute;left:calc(60% - 12px);top:-10px;box-shadow:var(--elev-2);}
  /* Stepper */
  .stepper{display:flex;align-items:center;gap:0;width:fit-content;border:1px solid var(--border-default);border-radius:var(--radius-md);overflow:hidden;}
  .stepper button{background:var(--surface);border:0;width:40px;height:40px;font-size:18px;color:var(--text-primary);cursor:pointer;font-family:inherit;}
  .stepper button:hover{background:var(--grey-100);}
  .stepper .val{width:56px;text-align:center;font-size:15px;font-weight:500;font-family:var(--font-mono);}
  /* Rating */
  .rating{display:flex;gap:4px;}
  .star{font-size:22px;color:var(--yellow-400);}
  .star.off{color:var(--grey-200);}
</style></head>
<body>
  <div class="col">
    <div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:8px;"><span>Send 3,000</span><span>of 5,000 QAR</span></div>
      <div class="slider"><div class="track"><div class="fill"></div><div class="thumb"></div></div></div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <span style="font-size:13px;color:var(--text-secondary);">Guests</span>
      <div class="stepper"><button>−</button><div class="val">3</div><button>+</button></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="rating"><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star off">★</span></div>
      <span style="font-size:13px;color:var(--text-secondary);">4.0 · 1,284 reviews</span>
    </div>
  </div>
</body></html>
