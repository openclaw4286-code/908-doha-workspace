<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:var(--grey-50);margin:0;padding:28px 20px;color:var(--text-primary);}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;text-align:center;}
  .box{aspect-ratio:1.2;background:var(--surface);border-radius:var(--radius-lg);}
  .n{font-size:10px;font-weight:600;color:var(--text-secondary);margin-top:12px;}
</style></head>
<body>
  <div class="grid">
    <div><div class="box" style="box-shadow:var(--elev-0);border:1px solid var(--border-subtle)"></div><div class="n">elev-0</div></div>
    <div><div class="box" style="box-shadow:var(--elev-1)"></div><div class="n">elev-1</div></div>
    <div><div class="box" style="box-shadow:var(--elev-2)"></div><div class="n">elev-2</div></div>
    <div><div class="box" style="box-shadow:var(--elev-3)"></div><div class="n">elev-3</div></div>
    <div><div class="box" style="box-shadow:var(--elev-4)"></div><div class="n">elev-4</div></div>
  </div>
</body></html>
