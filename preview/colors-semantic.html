<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:var(--surface);margin:0;padding:20px;}
  .scale{display:flex;gap:0;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-subtle);}
  .sw{flex:1;height:40px;display:flex;align-items:center;justify-content:center;color:var(--grey-900);font-size:9px;font-weight:600;}
  .sw.dark{color:#fff;}
  .lbl{font-size:11px;font-weight:600;color:var(--text-secondary);margin:10px 0 4px;letter-spacing:0.04em;text-transform:uppercase;}
  .sec{margin-bottom:2px;}
</style></head>
<body>
  <div class="sec"><div class="lbl">Red · Negative</div>
  <div class="scale">
    <div class="sw" style="background:var(--red-50)">50</div><div class="sw" style="background:var(--red-100)">100</div>
    <div class="sw" style="background:var(--red-200)">200</div><div class="sw" style="background:var(--red-300)">300</div>
    <div class="sw dark" style="background:var(--red-400)">400</div><div class="sw dark" style="background:var(--red-500)">500</div>
    <div class="sw dark" style="background:var(--red-600)">600</div><div class="sw dark" style="background:var(--red-700)">700</div>
    <div class="sw dark" style="background:var(--red-800)">800</div><div class="sw dark" style="background:var(--red-900)">900</div>
  </div></div>
  <div class="sec"><div class="lbl">Green · Positive</div>
  <div class="scale">
    <div class="sw" style="background:var(--green-50)">50</div><div class="sw" style="background:var(--green-100)">100</div>
    <div class="sw" style="background:var(--green-200)">200</div><div class="sw" style="background:var(--green-300)">300</div>
    <div class="sw dark" style="background:var(--green-400)">400</div><div class="sw dark" style="background:var(--green-500)">500</div>
    <div class="sw dark" style="background:var(--green-600)">600</div><div class="sw dark" style="background:var(--green-700)">700</div>
    <div class="sw dark" style="background:var(--green-800)">800</div><div class="sw dark" style="background:var(--green-900)">900</div>
  </div></div>
  <div class="sec"><div class="lbl">Orange · Warning</div>
  <div class="scale">
    <div class="sw" style="background:var(--orange-50)">50</div><div class="sw" style="background:var(--orange-100)">100</div>
    <div class="sw" style="background:var(--orange-200)">200</div><div class="sw" style="background:var(--orange-300)">300</div>
    <div class="sw dark" style="background:var(--orange-400)">400</div><div class="sw dark" style="background:var(--orange-500)">500</div>
    <div class="sw dark" style="background:var(--orange-600)">600</div><div class="sw dark" style="background:var(--orange-700)">700</div>
    <div class="sw dark" style="background:var(--orange-800)">800</div><div class="sw dark" style="background:var(--orange-900)">900</div>
  </div></div>
</body></html>
