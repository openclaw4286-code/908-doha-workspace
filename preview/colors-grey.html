<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:#fff;margin:0;padding:20px;}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);}
  .sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;color:#000;font-family:var(--font-sans);}
  .sw.dark{color:#fff;}
  .sw .n{font-size:10px;font-weight:600;}
  .sw .h{font-family:var(--font-mono);font-size:10px;opacity:0.7;margin-top:2px;}
  .lbl{font-size:11px;font-weight:600;color:#555;margin:14px 0 6px;letter-spacing:0.04em;text-transform:uppercase;font-family:var(--font-sans);}
  .ends{display:flex;gap:10px;margin-top:16px;}
  .end{flex:1;height:68px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-family:var(--font-sans);font-weight:700;letter-spacing:-0.02em;font-size:14px;}
  .paper{background:#FFFFFF;color:var(--grey-900);border:1px solid var(--grey-200);}
  .ink{background:var(--grey-900);color:#FFF;}
</style></head>
<body>
  <div class="lbl">Grey — warm sand ramp · #FFFFFF → #0A0907</div>
  <div class="row">
    <div class="sw" style="background:#FFFFFF;border-right:1px solid #F0F0F0"><div class="n">0</div><div class="h">#FFFFFF</div></div>
    <div class="sw" style="background:var(--grey-50)"><div class="n">50</div><div class="h">#FAF9F6</div></div>
    <div class="sw" style="background:var(--grey-100)"><div class="n">100</div><div class="h">#F2F0EB</div></div>
    <div class="sw" style="background:var(--grey-200)"><div class="n">200</div><div class="h">#E5E2DA</div></div>
    <div class="sw" style="background:var(--grey-300)"><div class="n">300</div><div class="h">#CECABE</div></div>
    <div class="sw dark" style="background:var(--grey-400)"><div class="n">400</div><div class="h">#9A9588</div></div>
    <div class="sw dark" style="background:var(--grey-500)"><div class="n">500</div><div class="h">#747067</div></div>
    <div class="sw dark" style="background:var(--grey-600)"><div class="n">600</div><div class="h">#53504A</div></div>
    <div class="sw dark" style="background:var(--grey-700)"><div class="n">700</div><div class="h">#34312D</div></div>
    <div class="sw dark" style="background:var(--grey-800)"><div class="n">800</div><div class="h">#1A1815</div></div>
    <div class="sw dark" style="background:var(--grey-900)"><div class="n">900</div><div class="h">#0A0907</div></div>
  </div>
  <div class="ends">
    <div class="end paper">Paper · #FFFFFF</div>
    <div class="end ink">Ink · #0A0907</div>
  </div>
</body></html>
