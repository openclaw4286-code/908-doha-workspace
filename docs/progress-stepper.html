<!doctype html><html lang="en"><head>

</head><body><div class="app">
<aside class="sidebar" id="sidebar"></aside>
<main class="content" id="content"></main>
<aside class="otp" id="otp"></aside>
</div><script>window.PAGE={"id":"progress-stepper","name":"Progress Stepper","eyebrow":"Feedback","lead":"Step-by-step progress. Rounded-rect step markers, animated connector fills, and a spring pop when the active step advances.","sections":[

  {"id":"default","title":"Default — rounded-rect steps","preview":"<style>.ps{display:flex;align-items:flex-start;width:360px;font-family:var(--font-sans)}.ps-step{display:flex;flex-direction:column;align-items:center;flex-shrink:0;gap:8px;position:relative}.ps-dot{width:30px;height:30px;border-radius:9px;background:var(--grey-200);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-tertiary);transition:background .32s var(--ease-soft),color .32s var(--ease-soft),transform .36s var(--ease-spring),box-shadow .32s var(--ease-soft)}.ps-step.done .ps-dot{background:var(--state-positive);color:#fff}.ps-step.on .ps-dot{background:var(--accent-brand);color:#fff;box-shadow:0 0 0 4px var(--accent-brand-soft);animation:psp .5s var(--ease-spring)}@keyframes psp{0%{transform:scale(.8)}40%{transform:scale(1.12)}100%{transform:scale(1)}}.ps-lbl{font-size:11px;font-weight:500;color:var(--text-tertiary);white-space:nowrap}.ps-step.done .ps-lbl,.ps-step.on .ps-lbl{color:var(--text-primary);font-weight:600}.ps-ln{flex:1;height:2px;background:var(--grey-200);margin:14px 6px 0;border-radius:2px;position:relative;overflow:hidden}.ps-ln::after{content:\"\";position:absolute;inset:0;background:var(--state-positive);transform-origin:left;transform:scaleX(0);transition:transform .6s var(--ease-soft)}.ps-ln.done::after{transform:scaleX(1)}.ps-ic{width:14px;height:14px}</style>\n    <div class=\"ps\"><div class=\"ps-step done\"><div class=\"ps-dot\"><svg class=\"ps-ic\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5 9-10\"/></svg></div><div class=\"ps-lbl\">Identity</div></div><div class=\"ps-ln done\"></div><div class=\"ps-step done\"><div class=\"ps-dot\"><svg class=\"ps-ic\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5 9-10\"/></svg></div><div class=\"ps-lbl\">Address</div></div><div class=\"ps-ln done\"></div><div class=\"ps-step on\"><div class=\"ps-dot\">3</div><div class=\"ps-lbl\">Income</div></div><div class=\"ps-ln\"></div><div class=\"ps-step\"><div class=\"ps-dot\">4</div><div class=\"ps-lbl\">Review</div></div></div>","previewMod":"left"},

  {"id":"interactive","title":"Tap Next to advance","preview":"<style>.psi{display:flex;align-items:flex-start;width:360px;font-family:var(--font-sans);margin-bottom:16px}.psi-step{display:flex;flex-direction:column;align-items:center;flex-shrink:0;gap:8px}.psi-dot{width:32px;height:32px;border-radius:10px;background:var(--grey-200);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text-tertiary);transition:background .32s var(--ease-soft),color .32s var(--ease-soft),transform .42s var(--ease-spring),box-shadow .32s var(--ease-soft)}.psi-step.done .psi-dot{background:var(--state-positive);color:#fff}.psi-step.on .psi-dot{background:var(--accent-brand);color:#fff;box-shadow:0 0 0 5px var(--accent-brand-soft);animation:psip .56s var(--ease-spring)}@keyframes psip{0%{transform:scale(.7)}40%{transform:scale(1.18)}100%{transform:scale(1)}}.psi-lbl{font-size:11px;font-weight:500;color:var(--text-tertiary);white-space:nowrap}.psi-step.done .psi-lbl,.psi-step.on .psi-lbl{color:var(--text-primary);font-weight:600}.psi-ln{flex:1;height:3px;background:var(--grey-200);margin:14.5px 6px 0;border-radius:2px;position:relative;overflow:hidden}.psi-ln::after{content:\"\";position:absolute;inset:0;background:var(--state-positive);transform-origin:left;transform:scaleX(0);transition:transform .6s var(--ease-soft)}.psi-ln.done::after{transform:scaleX(1)}.psi-ic{width:15px;height:15px}.psi-btns{display:flex;gap:8px;margin-top:4px}.psi-btns button{padding:9px 16px;border:0;border-radius:10px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;transition:transform .16s var(--ease-soft),background .2s var(--ease-soft)}.psi-btns button:active{transform:scale(.94)}.psi-prev{background:var(--grey-100);color:var(--text-primary)}.psi-next{background:var(--accent-brand);color:#fff}.psi-prev:hover{background:var(--grey-200)}.psi-next:hover{background:var(--accent-brand-hover)}</style>\n    <script>window.__psi=(root,d)=>{const steps=[...root.querySelectorAll('.psi-step')];const lns=[...root.querySelectorAll('.psi-ln')];let cur=steps.findIndex(s=>s.classList.contains('on'));const nx=Math.max(0,Math.min(steps.length-1,cur+d));steps.forEach((s,i)=>{s.classList.remove('on','done');if(i<nx)s.classList.add('done');else if(i===nx){void s.offsetWidth;s.classList.add('on')}});lns.forEach((l,i)=>{l.classList.toggle('done',i<nx)})}<\/script>\n    <div>\n      <div class=\"psi\"><div class=\"psi-step done\"><div class=\"psi-dot\"><svg class=\"psi-ic\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5 9-10\"/></svg></div><div class=\"psi-lbl\">Identity</div></div><div class=\"psi-ln done\"></div><div class=\"psi-step on\"><div class=\"psi-dot\">2</div><div class=\"psi-lbl\">Address</div></div><div class=\"psi-ln\"></div><div class=\"psi-step\"><div class=\"psi-dot\">3</div><div class=\"psi-lbl\">Income</div></div><div class=\"psi-ln\"></div><div class=\"psi-step\"><div class=\"psi-dot\">4</div><div class=\"psi-lbl\">Review</div></div></div>\n      <div class=\"psi-btns\"><button class=\"psi-prev\" onclick=\"__psi(this.parentElement.previousElementSibling,-1)\">← Prev</button><button class=\"psi-next\" onclick=\"__psi(this.parentElement.previousElementSibling,1)\">Next →</button></div>\n    </div>","previewMod":"left"},

  {"id":"compact","title":"Compact — numeric squares","preview":"<style>.psc{display:flex;align-items:center;gap:4px;width:300px;font-family:var(--font-sans)}.psc-s{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--grey-100);color:var(--text-tertiary);transition:all .32s var(--ease-soft)}.psc-s.done{background:var(--state-positive-soft);color:var(--state-positive)}.psc-s.on{background:var(--accent-brand);color:#fff;transform:scale(1.08)}.psc-ln{flex:1;height:2px;background:var(--grey-200);border-radius:2px;position:relative;overflow:hidden}.psc-ln.done{background:var(--state-positive)}</style>\n    <div class=\"psc\"><div class=\"psc-s done\">1</div><div class=\"psc-ln done\"></div><div class=\"psc-s done\">2</div><div class=\"psc-ln done\"></div><div class=\"psc-s on\">3</div><div class=\"psc-ln\"></div><div class=\"psc-s\">4</div><div class=\"psc-ln\"></div><div class=\"psc-s\">5</div></div>","previewMod":"left"}

],"props":[{"name":"steps","type":"{label}[]"},{"name":"current","type":"number","desc":"0-indexed active step."},{"name":"variant","type":"\"default\" | \"compact\"","default":"\"default\""}]};</script>
