</head><body><div class="app">

<aside class="otp" id="otp"></aside>
</div><script>window.PAGE={"id":"stepper","name":"Numeric Stepper","eyebrow":"Inputs","lead":"Increment / decrement an integer value with tappable +/− buttons. Three shapes — filled pill (default), bare (no outer frame), and line — plus sizes and a big-number variant for cart quantities.","sections":[
  {"id":"default","title":"Filled","preview":"<style>.st{display:inline-flex;align-items:center;background:var(--grey-100);border-radius:12px;padding:4px;gap:4px}.st button{width:32px;height:32px;border-radius:9px;border:0;background:var(--surface);font-family:var(--font-sans);font-weight:600;font-size:16px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.06);transition:transform .16s var(--ease-soft),background .2s var(--ease-soft);color:var(--text-primary)}.st button:hover{background:var(--grey-50)}.st button:active{transform:scale(.88)}.st button.dis{background:transparent;color:var(--text-tertiary);box-shadow:none;cursor:not-allowed}.st button.dis:active{transform:none}.st .v{min-width:36px;text-align:center;font-weight:700;font-family:var(--font-mono);color:var(--text-primary)}</style>\n    <div style=\"display:flex;gap:16px;align-items:center;flex-wrap:wrap\">\n      <div class=\"st\"><button class=\"dis\">−</button><span class=\"v\">1</span><button>+</button></div>\n      <div class=\"st\"><button>−</button><span class=\"v\">4</span><button>+</button></div>\n      <div class=\"st\"><button>−</button><span class=\"v\">12</span><button class=\"dis\">+</button></div>\n    </div>","previewMod":"row"},

  {"id":"bare","title":"Bare — no outer frame","preview":"<style>.stb{display:inline-flex;align-items:center;gap:12px}.stb button{width:36px;height:36px;border-radius:10px;border:0;background:var(--grey-100);font-family:var(--font-sans);font-weight:700;font-size:18px;cursor:pointer;color:var(--text-primary);transition:transform .16s var(--ease-soft),background .2s var(--ease-soft);display:inline-flex;align-items:center;justify-content:center}.stb button:hover{background:var(--grey-200)}.stb button:active{transform:scale(.88)}.stb button.dis{background:var(--grey-50);color:var(--text-tertiary);cursor:not-allowed}.stb button.dis:active{transform:none}.stb .v{min-width:44px;text-align:center;font-weight:700;font-family:var(--font-mono);font-size:17px;color:var(--text-primary)}</style>\n    <div style=\"display:flex;gap:24px;align-items:center;flex-wrap:wrap\">\n      <div class=\"stb\"><button class=\"dis\">−</button><span class=\"v\">1</span><button>+</button></div>\n      <div class=\"stb\"><button>−</button><span class=\"v\">4</span><button>+</button></div>\n      <div class=\"stb\"><button>−</button><span class=\"v\">12</span><button class=\"dis\">+</button></div>\n    </div>","previewMod":"row"},

  {"id":"line","title":"Line","preview":"<style>.stl{display:inline-flex;align-items:center;border:1px solid var(--border-default);border-radius:10px;overflow:hidden}.stl button{width:36px;height:36px;border:0;background:var(--surface);font-family:var(--font-sans);font-weight:600;font-size:16px;cursor:pointer;color:var(--text-primary);transition:background .2s var(--ease-soft)}.stl button:hover{background:var(--grey-50)}.stl button:active{background:var(--grey-100)}.stl button.dis{color:var(--text-tertiary);cursor:not-allowed}.stl .v{min-width:48px;text-align:center;font-weight:600;font-family:var(--font-mono);font-size:14px;color:var(--text-primary);border-left:1px solid var(--border-subtle);border-right:1px solid var(--border-subtle);padding:0 10px;height:36px;line-height:36px}</style>\n    <div style=\"display:flex;gap:16px;align-items:center\">\n      <div class=\"stl\"><button class=\"dis\">−</button><span class=\"v\">0</span><button>+</button></div>\n      <div class=\"stl\"><button>−</button><span class=\"v\">3</span><button>+</button></div>\n      <div class=\"stl\"><button>−</button><span class=\"v\">99</span><button>+</button></div>\n    </div>","previewMod":"row"},

  {"id":"sizes","title":"Sizes","preview":"<style>.sts{display:inline-flex;align-items:center;gap:10px}.sts button{border-radius:9px;border:0;background:var(--grey-100);font-family:var(--font-sans);font-weight:700;cursor:pointer;color:var(--text-primary);transition:all .16s var(--ease-soft);display:inline-flex;align-items:center;justify-content:center}.sts button:hover{background:var(--grey-200)}.sts button:active{transform:scale(.88)}.sts .v{text-align:center;font-weight:700;font-family:var(--font-mono);color:var(--text-primary)}.sts.lg button{width:44px;height:44px;font-size:22px}.sts.lg .v{min-width:52px;font-size:20px}.sts.md button{width:36px;height:36px;font-size:18px}.sts.md .v{min-width:44px;font-size:16px}.sts.sm button{width:28px;height:28px;font-size:15px}.sts.sm .v{min-width:32px;font-size:14px}.sts-lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.08em;margin-right:14px;min-width:54px}</style>\n    <div style=\"display:flex;flex-direction:column;gap:14px\">\n      <div style=\"display:flex;align-items:center\"><span class=\"sts-lbl\">Large</span><div class=\"sts lg\"><button>−</button><span class=\"v\">4</span><button>+</button></div></div>\n      <div style=\"display:flex;align-items:center\"><span class=\"sts-lbl\">Medium</span><div class=\"sts md\"><button>−</button><span class=\"v\">4</span><button>+</button></div></div>\n      <div style=\"display:flex;align-items:center\"><span class=\"sts-lbl\">Small</span><div class=\"sts sm\"><button>−</button><span class=\"v\">4</span><button>+</button></div></div>\n    </div>"},

  {"id":"interactive","title":"Tap to change","preview":"<style>.sti{display:inline-flex;align-items:center;gap:14px}.sti button{width:40px;height:40px;border-radius:11px;border:0;background:var(--grey-100);font-family:var(--font-sans);font-weight:700;font-size:20px;cursor:pointer;color:var(--text-primary);transition:all .16s var(--ease-soft);display:inline-flex;align-items:center;justify-content:center}.sti button:hover{background:var(--grey-200)}.sti button:active{transform:scale(.86)}.sti .v{min-width:48px;text-align:center;font-weight:700;font-family:var(--font-mono);font-size:18px;color:var(--text-primary)}.sti .v.bump{animation:stib .28s var(--ease-spring)}@keyframes stib{0%{transform:scale(1)}50%{transform:scale(1.18);color:var(--accent-brand)}100%{transform:scale(1)}}</style>\n    <script>window.__stb=(el,d)=>{const v=el.parentElement.querySelector('.v');let n=parseInt(v.textContent,10)+d;if(n<0)n=0;if(n>99)n=99;v.textContent=n;v.classList.remove('bump');void v.offsetWidth;v.classList.add('bump')}<\/script>\n    <div class=\"sti\"><button onclick=\"__stb(this,-1)\">−</button><span class=\"v\">2</span><button onclick=\"__stb(this,1)\">+</button></div>","previewMod":"row"},

  {"id":"context","title":"In context — cart item","preview":"<style>.ci{display:flex;align-items:center;gap:14px;padding:14px;background:var(--surface);border:1px solid var(--border-subtle);border-radius:14px;width:340px;font-family:var(--font-sans)}.ci-img{width:52px;height:52px;border-radius:10px;background:repeating-linear-gradient(45deg,var(--grey-100),var(--grey-100) 4px,var(--grey-50) 4px,var(--grey-50) 8px);flex-shrink:0}.ci-m{flex:1}.ci-t{font-size:14px;font-weight:600;color:var(--text-primary)}.ci-p{font-size:12px;color:var(--text-tertiary);font-family:var(--font-mono);margin-top:2px}.stx{display:inline-flex;align-items:center;gap:10px}.stx button{width:30px;height:30px;border-radius:8px;border:0;background:var(--grey-100);font-weight:700;font-size:15px;cursor:pointer;color:var(--text-primary);transition:all .16s var(--ease-soft)}.stx button:hover{background:var(--grey-200)}.stx button:active{transform:scale(.88)}.stx .v{min-width:20px;text-align:center;font-weight:700;font-family:var(--font-mono);font-size:14px}</style>\n    <div class=\"ci\"><div class=\"ci-img\"></div><div class=\"ci-m\"><div class=\"ci-t\">Arabica filter beans</div><div class=\"ci-p\">QAR 62 · 250 g</div></div><div class=\"stx\"><button>−</button><span class=\"v\">2</span><button>+</button></div></div>","previewMod":"left"}
],"props":[{"name":"value","type":"number"},{"name":"min","type":"number","default":"0"},{"name":"max","type":"number"},{"name":"variant","type":"\"pill\" | \"bare\" | \"line\"","default":"\"pill\""},{"name":"size","type":"\"sm\" | \"md\" | \"lg\"","default":"\"md\""},{"name":"onChange","type":"(v) => void"}]};</script>
