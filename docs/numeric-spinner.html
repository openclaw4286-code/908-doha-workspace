</div><script>window.PAGE={"id":"numeric-spinner","name":"Numeric Spinner","eyebrow":"Inputs","lead":"Pachinko-style per-digit reel — an <em>animation pattern</em>, not an input control. Use when a number lands with weight: balances, totals, winnings, countdowns. Digits tumble on an empty canvas; no chrome, no box.","sections":[{"id":"demo","title":"Pachinko reel","preview":"<style>.odo{display:flex;gap:2px;font-family:var(--font-mono);font-size:40px;font-weight:700;color:var(--text-primary);letter-spacing:-0.02em;line-height:1}.odo .d{width:26px;height:48px;overflow:hidden;position:relative}.odo .d .strip{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;left:50%;transform-origin:top left}.odo .d .strip span{display:block;height:48px;line-height:48px;width:26px;text-align:center;transform:translateX(-50%)}.odo .sep{height:48px;line-height:48px;color:var(--text-tertiary);padding:0 2px}.odo .d1 .strip{animation:ospin 2600ms cubic-bezier(.12,.85,.2,1) infinite}.odo .d2 .strip{animation:ospin 2600ms cubic-bezier(.12,.85,.2,1) infinite;animation-delay:120ms}.odo .d3 .strip{animation:ospin 2600ms cubic-bezier(.12,.85,.2,1) infinite;animation-delay:260ms}.odo .d4 .strip{animation:ospin 2600ms cubic-bezier(.12,.85,.2,1) infinite;animation-delay:420ms}@keyframes ospin{0%{transform:translateY(0)}65%{transform:translateY(-432px)}80%{transform:translateY(-480px)}90%{transform:translateY(-468px)}100%{transform:translateY(-480px)}}</style>\n    <div class=\"odo\"><span class=\"d d1\"><span class=\"strip\"><span>3</span><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span></span></span><span class=\"d d2\"><span class=\"strip\"><span>4</span><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span></span></span><span class=\"sep\">,</span><span class=\"d d3\"><span class=\"strip\"><span>4</span><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span></span></span><span class=\"d d4\"><span class=\"strip\"><span>0</span><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span></span></span><span style=\"font-size:18px;font-weight:500;color:var(--text-tertiary);align-self:flex-end;padding-bottom:4px;padding-left:8px;font-family:var(--font-sans)\">QAR</span></div>","props":[{"name":"value","type":"number"},{"name":"duration","type":"number","default":"720","desc":"ms; per-digit spin time."},{"name":"format","type":"(n) => string","desc":"Formatter, e.g. thousand separators."}]}]};</script>
