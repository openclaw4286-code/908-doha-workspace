<!doctype html><html lang="en"><head>
<meta charset="utf-8"><title>908 Doha · Progress Bar</title>
<link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="./docs.css">
</head><body><div class="app">
<aside class="sidebar" id="sidebar"></aside>
<main class="content" id="content"></main>
<aside class="otp" id="otp"></aside>
</div><script>window.PAGE={"id":"progress-bar","name":"Progress Bar","eyebrow":"Feedback","lead":"Fills left-to-right to show known progress. Sizes from hairline to chunky, state tints for success/warn/error, plus indeterminate, stepped, segmented, and circular variants.","sections":[
  {"id":"default","title":"Default","preview":"<style>.pb{width:320px;height:8px;background:var(--grey-100);border-radius:99px;overflow:hidden}.pb-fl{height:100%;background:var(--accent-brand);border-radius:99px;transition:width .56s var(--ease-soft)}</style>\n    <div style=\"display:flex;flex-direction:column;gap:18px;width:320px\">\n      <div><div style=\"display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;font-family:var(--font-sans)\"><span style=\"font-weight:600;color:var(--text-primary)\">Goal: Eid</span><span style=\"font-family:var(--font-mono);color:var(--text-tertiary)\">QAR 2,050 / 3,200</span></div><div class=\"pb\"><div class=\"pb-fl\" style=\"width:64%\"></div></div></div>\n      <div><div style=\"display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;font-family:var(--font-sans)\"><span style=\"font-weight:600;color:var(--text-primary)\">Upload</span><span style=\"font-family:var(--font-mono);color:var(--text-tertiary)\">24%</span></div><div class=\"pb\"><div class=\"pb-fl\" style=\"width:24%\"></div></div></div>\n    </div>","previewMod":"left"},

  {"id":"sizes","title":"Sizes","preview":"<style>.pbs{width:320px;background:var(--grey-100);border-radius:99px;overflow:hidden}.pbs .fl{height:100%;background:var(--accent-brand);border-radius:99px}.pbs.xs{height:3px}.pbs.sm{height:6px}.pbs.md{height:10px}.pbs.lg{height:14px}.pbs-lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}</style>\n    <div style=\"display:flex;flex-direction:column;gap:16px;width:320px\">\n      <div><div class=\"pbs-lbl\">XS · 3 px · inline</div><div class=\"pbs xs\"><div class=\"fl\" style=\"width:48%\"></div></div></div>\n      <div><div class=\"pbs-lbl\">SM · 6 px · default</div><div class=\"pbs sm\"><div class=\"fl\" style=\"width:48%\"></div></div></div>\n      <div><div class=\"pbs-lbl\">MD · 10 px</div><div class=\"pbs md\"><div class=\"fl\" style=\"width:48%\"></div></div></div>\n      <div><div class=\"pbs-lbl\">LG · 14 px · hero goals</div><div class=\"pbs lg\"><div class=\"fl\" style=\"width:48%\"></div></div></div>\n    </div>","previewMod":"left"},

  {"id":"states","title":"States","preview":"<style>.pbt{width:320px;height:8px;background:var(--grey-100);border-radius:99px;overflow:hidden}.pbt .fl{height:100%;border-radius:99px}.brand{background:var(--accent-brand)}.pos{background:var(--state-positive)}.warn{background:var(--state-warning)}.neg{background:var(--state-negative)}.pbt-lbl{font-family:var(--font-sans);font-size:12px;font-weight:600;color:var(--text-primary);display:flex;justify-content:space-between;margin-bottom:6px}.pbt-lbl .s{font-weight:500}</style>\n    <div style=\"display:flex;flex-direction:column;gap:14px;width:320px\">\n      <div><div class=\"pbt-lbl\"><span>Saving · on track</span><span class=\"s\" style=\"color:var(--accent-brand)\">64%</span></div><div class=\"pbt\"><div class=\"fl brand\" style=\"width:64%\"></div></div></div>\n      <div><div class=\"pbt-lbl\"><span>KYC</span><span class=\"s\" style=\"color:var(--state-positive)\">Complete</span></div><div class=\"pbt\"><div class=\"fl pos\" style=\"width:100%\"></div></div></div>\n      <div><div class=\"pbt-lbl\"><span>Budget · groceries</span><span class=\"s\" style=\"color:var(--state-warning)\">Nearing limit</span></div><div class=\"pbt\"><div class=\"fl warn\" style=\"width:86%\"></div></div></div>\n      <div><div class=\"pbt-lbl\"><span>Budget · dining</span><span class=\"s\" style=\"color:var(--state-negative)\">Over by QAR 120</span></div><div class=\"pbt\"><div class=\"fl neg\" style=\"width:100%\"></div></div></div>\n    </div>","previewMod":"left"},

  {"id":"indeterminate","title":"Indeterminate","preview":"<style>.pbi{width:320px;height:6px;background:var(--grey-100);border-radius:99px;overflow:hidden;position:relative}.pbi::after{content:\"\";position:absolute;top:0;bottom:0;width:40%;background:var(--accent-brand);border-radius:99px;animation:pbi 1.4s var(--ease-soft) infinite}@keyframes pbi{0%{left:-40%}100%{left:100%}}.pbi-lbl{font-family:var(--font-sans);font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}</style>\n    <div style=\"display:flex;flex-direction:column;gap:14px;width:320px\">\n      <div><div class=\"pbi-lbl\">Connecting to bank…</div><div class=\"pbi\"></div></div>\n      <div><div class=\"pbi-lbl\">Verifying QID</div><div class=\"pbi\"></div></div>\n    </div>","previewMod":"left"},

  {"id":"stepped","title":"Stepped — multi-stage flow","preview":"<style>.pst{width:320px;display:flex;gap:6px}.pst .seg{flex:1;height:6px;background:var(--grey-100);border-radius:99px;overflow:hidden}.pst .seg .fl{height:100%;background:var(--accent-brand);border-radius:99px;transition:width .5s var(--ease-soft)}.pst-meta{display:flex;justify-content:space-between;font-family:var(--font-sans);font-size:12px;margin-top:10px}.pst-meta .cur{font-weight:700;color:var(--text-primary)}.pst-meta .tot{color:var(--text-tertiary);font-family:var(--font-mono)}</style>\n    <div style=\"width:320px\">\n      <div class=\"pst\">\n        <div class=\"seg\"><div class=\"fl\" style=\"width:100%\"></div></div>\n        <div class=\"seg\"><div class=\"fl\" style=\"width:100%\"></div></div>\n        <div class=\"seg\"><div class=\"fl\" style=\"width:60%\"></div></div>\n        <div class=\"seg\"><div class=\"fl\" style=\"width:0\"></div></div>\n        <div class=\"seg\"><div class=\"fl\" style=\"width:0\"></div></div>\n      </div>\n      <div class=\"pst-meta\"><span class=\"cur\">Verify identity</span><span class=\"tot\">Step 3 / 5</span></div>\n    </div>","previewMod":"left"},

  {"id":"segmented","title":"Segmented budget","preview":"<style>.psg{width:320px;height:14px;background:var(--grey-100);border-radius:99px;overflow:hidden;display:flex}.psg .part{height:100%;transition:width .5s var(--ease-soft)}.psg .a{background:var(--accent-brand)}.psg .b{background:var(--accent-brand-soft)}.psg .c{background:var(--state-warning)}.psg-key{display:flex;gap:14px;margin-top:10px;font-family:var(--font-sans);font-size:12px;color:var(--text-secondary)}.psg-key .kd{display:inline-flex;align-items:center;gap:6px}.psg-key .sw{width:8px;height:8px;border-radius:2px}</style>\n    <div style=\"width:320px\">\n      <div class=\"psg\"><div class=\"part a\" style=\"width:45%\"></div><div class=\"part b\" style=\"width:25%\"></div><div class=\"part c\" style=\"width:20%\"></div></div>\n      <div class=\"psg-key\"><span class=\"kd\"><span class=\"sw\" style=\"background:var(--accent-brand)\"></span>Essentials 45%</span><span class=\"kd\"><span class=\"sw\" style=\"background:var(--accent-brand-soft)\"></span>Saving 25%</span><span class=\"kd\"><span class=\"sw\" style=\"background:var(--state-warning)\"></span>Dining 20%</span></div>\n    </div>","previewMod":"left"},

  {"id":"inline","title":"Inline with value","preview":"<style>.pin{display:flex;align-items:center;gap:12px;width:320px;font-family:var(--font-sans)}.pin .bar{flex:1;height:6px;background:var(--grey-100);border-radius:99px;overflow:hidden}.pin .bar .fl{height:100%;background:var(--accent-brand);border-radius:99px}.pin .v{font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--text-primary);min-width:44px;text-align:right}.pin .lbl{font-size:13px;color:var(--text-primary);font-weight:500;min-width:72px}</style>\n    <div style=\"display:flex;flex-direction:column;gap:10px\">\n      <div class=\"pin\"><span class=\"lbl\">Storage</span><span class=\"bar\"><span class=\"fl\" style=\"width:32%\"></span></span><span class=\"v\">32%</span></div>\n      <div class=\"pin\"><span class=\"lbl\">Attendance</span><span class=\"bar\"><span class=\"fl\" style=\"width:74%\"></span></span><span class=\"v\">74%</span></div>\n      <div class=\"pin\"><span class=\"lbl\">Limit used</span><span class=\"bar\"><span class=\"fl\" style=\"width:92%;background:var(--state-warning)\"></span></span><span class=\"v\" style=\"color:var(--state-warning)\">92%</span></div>\n    </div>","previewMod":"left"},

  {"id":"circular","title":"Circular","preview":"<style>.prc{display:flex;gap:24px;align-items:center}.prc svg{transform:rotate(-90deg)}.prc .tr{stroke:var(--grey-100)}.prc .vl{stroke:var(--accent-brand);stroke-linecap:round;transition:stroke-dashoffset .7s var(--ease-soft)}.prc .pos{stroke:var(--state-positive)}.prc .warn{stroke:var(--state-warning)}.prc .lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:14px;color:var(--text-primary)}.prc .w{position:relative;width:72px;height:72px}.prc-cap{font-family:var(--font-sans);font-size:11px;color:var(--text-tertiary);text-align:center;margin-top:6px;font-weight:500}</style>\n    <div class=\"prc\">\n      <div><div class=\"w\"><svg width=\"72\" height=\"72\"><circle class=\"tr\" cx=\"36\" cy=\"36\" r=\"30\" fill=\"none\" stroke-width=\"6\"/><circle class=\"vl\" cx=\"36\" cy=\"36\" r=\"30\" fill=\"none\" stroke-width=\"6\" stroke-dasharray=\"188.5\" stroke-dashoffset=\"67.86\"/></svg><div class=\"lbl\">64%</div></div><div class=\"prc-cap\">Saving</div></div>\n      <div><div class=\"w\"><svg width=\"72\" height=\"72\"><circle class=\"tr\" cx=\"36\" cy=\"36\" r=\"30\" fill=\"none\" stroke-width=\"6\"/><circle class=\"vl pos\" cx=\"36\" cy=\"36\" r=\"30\" fill=\"none\" stroke-width=\"6\" stroke-dasharray=\"188.5\" stroke-dashoffset=\"0\"/></svg><div class=\"lbl\" style=\"color:var(--state-positive)\">✓</div></div><div class=\"prc-cap\">KYC</div></div>\n      <div><div class=\"w\"><svg width=\"72\" height=\"72\"><circle class=\"tr\" cx=\"36\" cy=\"36\" r=\"30\" fill=\"none\" stroke-width=\"6\"/><circle class=\"vl warn\" cx=\"36\" cy=\"36\" r=\"30\" fill=\"none\" stroke-width=\"6\" stroke-dasharray=\"188.5\" stroke-dashoffset=\"26.39\"/></svg><div class=\"lbl\" style=\"color:var(--state-warning)\">86%</div></div><div class=\"prc-cap\">Budget</div></div>\n    </div>","previewMod":"row"}
],"props":[{"name":"value","type":"number","desc":"0\u2013100. Omit for indeterminate."},{"name":"size","type":"\"xs\" | \"sm\" | \"md\" | \"lg\"","default":"\"sm\""},{"name":"tone","type":"\"brand\" | \"positive\" | \"warning\" | \"negative\"","default":"\"brand\""},{"name":"variant","type":"\"linear\" | \"stepped\" | \"segmented\" | \"circular\"","default":"\"linear\""}]};</script>
<script src="./page.js"></script><script src="./docs.js"></script>
<script src="./interactions.js"></script>
</body></html>
