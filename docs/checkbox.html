none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5 9-10\"/></svg></span>Remember this device</label>\n      <label class=\"lbl\" onclick=\"const c=this.querySelector('.cb');c.classList.toggle('ind');c.classList.remove('on');event.preventDefault()\"><span class=\"cb ind\"><span class=\"bar\"></span></span>Select all</label>\n      <label class=\"lbl\" style=\"cursor:not-allowed;opacity:.6\" onclick=\"event.preventDefault()\"><span class=\"cb dis\"></span><span style=\"color:var(--text-tertiary)\">Disabled</span></label>\n    </div>"},

entColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5 9-10\"/></svg></span>Offers & promos</div>\n    </div>"}
