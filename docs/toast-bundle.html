</div><script>window.PAGE={"id":"toast","name":"Toast","eyebrow":"Feedback","lead":"Transient confirmation that appears without blocking. Fully rounded pill on a white surface with a soft shadow. Five tones, optional leading icon, optional trailing action, and stacking support.","sections":[

  {"id":"twoline","title":"Two-line","preview":"<div style=\"display:flex;flex-direction:column;gap:10px;width:380px;font-family:var(--font-sans)\">\n      <div style=\"display:flex;align-items:center;gap:14px;padding:14px 20px;background:#fff;color:var(--text-primary);border-radius:28px;box-shadow:0 10px 28px rgba(15,20,30,.12),0 1px 3px rgba(15,20,30,.08);border:1px solid var(--border-subtle)\">\n        <div style=\"width:32px;height:32px;border-radius:50%;background:var(--state-positive);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"><path d=\"M5 12l5 5 9-11\"/></svg></div>\n        <div style=\"flex:1\"><div style=\"font-size:14px;font-weight:700;margin-bottom:2px\">Transfer sent</div><div style=\"font-size:12px;color:var(--text-tertiary);font-weight:500\">QAR 2,400 to Ahmad \u00b7 arriving instantly</div></div>\n      </div>\n      <div style=\"display:flex;align-items:center;gap:14px;padding:14px 20px;background:#fff;color:var(--text-primary);border-radius:28px;box-shadow:0 10px 28px rgba(15,20,30,.12),0 1px 3px rgba(15,20,30,.08);border:1px solid var(--border-subtle)\">\n        <div style=\"width:32px;height:32px;border-radius:50%;background:var(--accent-brand);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M12 2v20M2 12h20\"/></svg></div>\n        <div style=\"flex:1\"><div style=\"font-size:14px;font-weight:700;margin-bottom:2px\">Budget updated</div><div style=\"font-size:12px;color:var(--text-tertiary);font-weight:500\">Dining \u00b7 QAR 800 per month</div></div>\n      </div>\n    </div>"},

  {"id":"stacked","title":"Stacked \u2014 newest on top","preview":"<div style=\"position:relative;width:380px;height:190px;font-family:var(--font-sans)\">\n      <div style=\"position:absolute;top:30px;left:20px;right:20px;padding:12px 18px;background:#fff;color:var(--text-primary);border-radius:999px;box-shadow:0 4px 12px rgba(15,20,30,.08);border:1px solid var(--border-subtle);transform:scale(.9);opacity:.45;font-size:13px;font-weight:600\">Draft saved</div>\n      <div style=\"position:absolute;top:18px;left:12px;right:12px;padding:12px 18px;background:#fff;color:var(--text-primary);border-radius:999px;box-shadow:0 6px 18px rgba(15,20,30,.10);border:1px solid var(--border-subtle);transform:scale(.95);opacity:.78;font-size:13px;font-weight:600\">Card frozen</div>\n      <div style=\"position:absolute;top:0;left:0;right:0;padding:12px 18px;background:#fff;color:var(--text-primary);border-radius:999px;box-shadow:0 10px 28px rgba(15,20,30,.14),0 1px 3px rgba(15,20,30,.08);border:1px solid var(--border-subtle);display:flex;align-items:center;gap:10px\"><div style=\"width:22px;height:22px;border-radius:50%;background:var(--state-positive);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"><path d=\"M5 12l5 5 9-11\"/></svg></div><div style=\"flex:1;font-size:13px;font-weight:600\">Receipt uploaded</div></div>\n    </div>"},

  {"id":"positions","title":"Position \u2014 top / bottom","preview":"<div style=\"display:flex;gap:18px;font-family:var(--font-sans)\">\n      <div style=\"width:200px;height:340px;border:1px solid var(--border-subtle);border-radius:24px;overflow:hidden;position:relative;background:var(--grey-100)\">\n        <div style=\"position:absolute;top:0;left:0;right:0;height:28px;background:var(--surface)\"></div>\n        <div style=\"position:absolute;top:40px;left:12px;right:12px;padding:9px 14px;background:#fff;color:var(--text-primary);border-radius:999px;box-shadow:0 8px 20px rgba(15,20,30,.14),0 1px 3px rgba(15,20,30,.08);border:1px solid var(--border-subtle);font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px\"><div style=\"width:16px;height:16px;border-radius:50%;background:var(--state-positive);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"><path d=\"M5 12l5 5 9-11\"/></svg></div>Saved</div>\n        <div style=\"position:absolute;bottom:8px;left:0;right:0;text-align:center;font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary);letter-spacing:.08em;text-transform:uppercase\">Top</div>\n      </div>\n      <div style=\"width:200px;height:340px;border:1px solid var(--border-subtle);border-radius:24px;overflow:hidden;position:relative;background:var(--grey-100)\">\n        <div style=\"position:absolute;top:0;left:0;right:0;height:28px;background:var(--surface)\"></div>\n        <div style=\"position:absolute;bottom:24px;left:12px;right:12px;padding:9px 14px;background:#fff;color:var(--text-primary);border-radius:999px;box-shadow:0 8px 20px rgba(15,20,30,.14),0 1px 3px rgba(15,20,30,.08);border:1px solid var(--border-subtle);font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px\"><div style=\"width:16px;height:16px;border-radius:50%;background:var(--state-positive);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff\"><svg width=\"9\" height=\"9\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"><path d=\"M5 12l5 5 9-11\"/></svg></div>Saved</div>\n        <div style=\"position:absolute;top:36px;left:0;right:0;text-align:center;font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary);letter-spacing:.08em;text-transform:uppercase\">Bottom</div>\n      </div>\n    </div>"},

  {"id":"live","title":"Tap to show","preview":"<style>.tlv{position:relative;width:360px;height:260px;border:1px solid var(--border-subtle);border-radius:20px;overflow:hidden;background:linear-gradient(180deg,var(--grey-50),var(--grey-100));font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;padding:16px}.tlv-btn{padding:9px 14px;border:0;border-radius:10px;font-family:inherit;font-weight:600;font-size:12px;cursor:pointer;background:var(--surface);color:var(--text-primary);box-shadow:0 1px 3px rgba(0,0,0,.08);transition:transform .16s var(--ease-soft)}.tlv-btn:active{transform:scale(.94)}.tlv-host{position:absolute;top:14px;left:16px;right:16px;display:flex;flex-direction:column;gap:8px;pointer-events:none;z-index:3}.tlv-t{padding:11px 18px;border-radius:999px;background:#fff;color:var(--text-primary);border:1px solid var(--border-subtle);box-shadow:0 10px 28px rgba(15,20,30,.14),0 1px 3px rgba(15,20,30,.08);display:flex;align-items:center;gap:10px;font-size:12px;font-weight:600;transform:translateY(-20px);opacity:0;animation:tlvin .34s var(--ease-spring) forwards,tlvout .28s var(--ease-soft) forwards 2.6s}@keyframes tlvin{to{transform:translateY(0);opacity:1}}@keyframes tlvout{to{transform:translateY(-12px);opacity:0}}.tlv-t .dot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}.tlv-t.pos .dot{background:var(--state-positive)}.tlv-t.neg .dot{background:var(--state-negative)}.tlv-t.warn .dot{background:#D29A1E}</style>\n    <script>window.__toast=(btn,tone,msg)=>{const host=btn.closest('.tlv').querySelector('.tlv-host');const t=document.createElement('div');t.className='tlv-t '+tone;t.innerHTML='<span class=\"dot\"><svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"><path d=\"M5 12l5 5 9-11\"/></svg></span><span style=\"flex:1\">'+msg+'</span>';host.appendChild(t);setTimeout(()=>t.remove(),3100)}<\/script>\n    <div class=\"tlv\">\n      <div class=\"tlv-host\"></div>\n      <button class=\"tlv-btn\" onclick=\"__toast(this,'pos','Card frozen')\">Freeze card</button>\n      <button class=\"tlv-btn\" onclick=\"__toast(this,'neg','Couldn\\u2019t connect')\">Fail</button>\n      <button class=\"tlv-btn\" onclick=\"__toast(this,'warn','Daily limit almost reached')\">Warn</button>\n    </div>","previewMod":"left"}

],"props":[{"name":"message","type":"string"},{"name":"tone","type":"\"neutral\" | \"positive\" | \"negative\" | \"warning\" | \"info\"","default":"\"neutral\""},{"name":"icon","type":"ReactNode","desc":"Optional leading icon."},{"name":"action","type":"{label,onPress}","desc":"Optional trailing text action."},{"name":"duration","type":"number","default":"3000","desc":"Auto-dismiss in ms. 0 = persist."},{"name":"position","type":"\"top\" | \"bottom\"","default":"\"top\""}]};</script>
