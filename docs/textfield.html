  {"id":"clearable","title":"Clearable & password","preview":"<style>.tfc{display:flex;align-items:center;gap:8px;background:var(--grey-50);border-radius:12px;padding:12px 14px;border:1.5px solid transparent;width:280px}.tfc:focus-within{background:var(--surface);border-color:var(--accent-brand)}.tfc input{flex:1;background:transparent;border:0;outline:0;font-family:var(--font-sans);font-size:16px;font-weight:500;color:var(--text-primary)}.tfc .clr{width:20px;height:20px;border-radius:50%;background:var(--grey-300);color:var(--surface);border:0;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .2s var(--ease-soft)}.tfc .clr:hover{background:var(--grey-400)}.tfc .tgl{background:transparent;border:0;color:var(--accent-brand);font-family:var(--font-sans);font-weight:600;font-size:12px;cursor:pointer;padding:2px 6px;border-radius:6px;transition:background .2s var(--ease-soft)}.tfc .tgl:hover{background:var(--grey-100)}</style>\n     <div style=\"display:flex;flex-direction:column;gap:12px\">\n       <div class=\"tfc\"><input value=\"Laila Karim Al-Thani\"><button class=\"clr\" aria-label=\"Clear\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"/><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"/></svg></button></div>\n       <div class=\"tfc\"><input type=\"password\" value=\"hunter22word\"><button class=\"tgl\">Show</button></div>\n       <div class=\"tfc\"><input value=\"••••••••••\" type=\"text\"><button class=\"tgl\">Hide</button></div>\n     </div>"},

  {"id":"counter","title":"Character counter","preview":"<style>.tfn{background:var(--grey-50);border-radius:12px;padding:8px 14px 10px;border:1.5px solid transparent;width:280px;transition:all .2s var(--ease-soft)}.tfn:focus-within{background:var(--surface);border-color:var(--accent-brand)}.tfn label{display:block;font-size:11px;font-weight:600;color:var(--text-tertiary);letter-spacing:.02em}.tfn input,.tfn textarea{width:100%;background:transparent;border:0;outline:0;font-family:var(--font-sans);font-size:15px;font-weight:500;color:var(--text-primary);padding:2px 0 0;resize:none}.tfn textarea{min-height:66px;line-height:1.45}.tfn-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text-tertiary);margin-top:6px;font-family:var(--font-sans)}.tfn-meta .ct{font-family:var(--font-mono)}</style>\n     <div style=\"display:flex;flex-direction:column;gap:14px\">\n       <div><div class=\"tfn\"><label>Memo</label><input value=\"Dinner at Morimoto\" maxlength=\"40\"></div><div class=\"tfn-meta\"><span>Max 40</span><span class=\"ct\">18 / 40</span></div></div>\n       <div><div class=\"tfn\"><label>Message to recipient</label><textarea maxlength=\"120\">Happy birthday Hamza! Coffee on me next week 🎉</textarea></div><div class=\"tfn-meta\"><span>Visible on receipt</span><span class=\"ct\">48 / 120</span></div></div>\n     </div>"},

  {"id":"inline","title":"Inline / chip-style","preview":"<style>.tfi{display:inline-flex;align-items:center;gap:6px;background:var(--grey-100);border-radius:999px;padding:8px 14px;font-family:var(--font-sans);font-size:13px;font-weight:500;transition:background .2s var(--ease-soft)}.tfi:focus-within{background:var(--surface);box-shadow:inset 0 0 0 1.5px var(--accent-brand)}.tfi input{background:transparent;border:0;outline:0;font:inherit;color:var(--text-primary);width:120px}.tfi .k{color:var(--text-tertiary);font-weight:600}</style>\n     <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n       <span class=\"tfi\"><span class=\"k\">From</span><input value=\"1 Mar\"></span>\n       <span class=\"tfi\"><span class=\"k\">To</span><input value=\"31 Mar\"></span>\n       <span class=\"tfi\"><span class=\"k\">Merchant</span><input placeholder=\"Any\"></span>\n     </div>","previewMod":"row"}
